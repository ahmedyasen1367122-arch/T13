<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css"
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Page</title>
</head>
<link rel="stylesheet" href="style.css"

<body>
    <div class="loginpageframe">
        <img src="profile_pic.png" alt="Profile Picture" />
        
        <h1 id="head">Login Page</h1>
        
        <form>
            <label for="user">Username:</label>
            <input type="text" id="user" name="username" placeholder="Enter your username" />
            <br /><br />
            
            <label for="pass">Password:</label>
            <input type="password" id="pass" name="password" placeholder="Enter your password" />
            <br /><br />
            
            <input type="submit" value="Login" />
            <br /><br />
            
            <a class="clic" href="#">Forgot Password?</a>
        </form>
    </div>
</body>
</html>
